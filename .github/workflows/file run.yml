name: CEREBRO CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tkinter (Linux dependency)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Verify Python version
        run: python --version

      - name: Run Unit Tests
        run: python cerebro_quiz.py --test